name: Deploy API to VPS (Direct Build)

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'apps/api/**'
      - 'docker/**'
      - '.github/workflows/deploy-api-direct.yml'
      - 'packages/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          # Install SSH key
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Copy entire project to VPS
          rsync -avz -e "ssh -p $VPS_PORT -i ~/.ssh/vps_key" \
            --exclude node_modules \
            --exclude dist \
            --exclude .git \
            --exclude .env \
            . $VPS_USER@$VPS_HOST:$VPS_DEPLOY_PATH/

          # Deploy using SSH commands
          ssh -p $VPS_PORT -i ~/.ssh/vps_key $VPS_USER@$VPS_HOST << 'DEPLOY'
          set -e
          
          cd $VPS_DEPLOY_PATH
          
          # Stop and remove old containers
          echo "🛑 Stopping old containers..."
          docker-compose -f docker/docker-compose.prod.yml down || true
          
          # Pull latest changes and build
          echo "🔨 Building Docker image..."
          docker-compose -f docker/docker-compose.prod.yml build --no-cache api
          
          # Start new containers
          echo "🚀 Starting containers..."
          docker-compose -f docker/docker-compose.prod.yml up -d
          
          # Wait for database to be ready
          echo "⏳ Waiting for database..."
          sleep 10
          
          # Run migrations/setup if needed
          echo "🗄️ Setting up database..."
          docker-compose -f docker/docker-compose.prod.yml exec -T api npm run start:prod || true
          
          echo "✅ Deployment completed!"
          DEPLOY

      - name: Verify deployment
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "📋 Container Status:"
          ssh -p $VPS_PORT -i ~/.ssh/vps_key $VPS_USER@$VPS_HOST << 'VERIFY'
          cd $VPS_DEPLOY_PATH
          docker-compose -f docker/docker-compose.prod.yml ps
          echo ""
          echo "📝 Recent Logs:"
          docker-compose -f docker/docker-compose.prod.yml logs --tail=20 api
          VERIFY

      - name: Notify on failure
        if: failure()
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p $VPS_PORT $VPS_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "❌ Deployment failed! Attempting to rollback..."
          ssh -p $VPS_PORT -i ~/.ssh/vps_key $VPS_USER@$VPS_HOST << 'ROLLBACK'
          cd $VPS_DEPLOY_PATH
          docker-compose -f docker/docker-compose.prod.yml logs --tail=50 api
          ROLLBACK
          
          exit 1
