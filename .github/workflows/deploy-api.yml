name: Deploy API to VPS

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'apps/api/**'
      - 'apps/docker/**'
      - '.github/workflows/deploy-api.yml'
      - 'packages/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Build image (unique tag using commit SHA)
      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t citizen-alert-api:${{ github.sha }} \
            -t citizen-alert-api:latest \
            .

          docker save citizen-alert-api:latest -o /tmp/image.tar

      # 4️⃣ Setup SSH
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # 5️⃣ Copy image to VPS
      - name: Copy image to VPS
        run: |
          scp -P ${{ secrets.VPS_PORT }} -i ~/.ssh/vps_key \
            /tmp/image.tar \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/image.tar

      # 6️⃣ Copy docker folder to VPS (IMPORTANT ✅)
      - name: Copy docker folder to VPS
        run: |
          scp -P ${{ secrets.VPS_PORT }} -i ~/.ssh/vps_key -r \
            docker \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_DEPLOY_PATH }}/

      # 7️⃣ Deploy on VPS
      - name: Deploy on VPS
        run: |
          DEPLOY_PATH=${{ secrets.VPS_DEPLOY_PATH }}

          ssh -p ${{ secrets.VPS_PORT }} -i ~/.ssh/vps_key \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "
          
          set -e

          mkdir -p $DEPLOY_PATH

          echo NODE_ENV=production > $DEPLOY_PATH/.env
          echo DATABASE_URL=postgresql://${{ secrets.DB_USER }}:${{ secrets.DB_PASSWORD }}@postgres:5432/${{ secrets.DB_NAME }} >> $DEPLOY_PATH/.env
          echo JWT_SECRET=${{ secrets.JWT_SECRET }} >> $DEPLOY_PATH/.env
          echo JWT_EXPIRATION=${{ secrets.JWT_EXPIRATION }} >> $DEPLOY_PATH/.env
          echo ALLOWED_ORIGINS='${{ secrets.ALLOWED_ORIGINS }}' >> $DEPLOY_PATH/.env
          echo API_PORT=${{ secrets.API_PORT }} >> $DEPLOY_PATH/.env
          echo DB_USER=${{ secrets.DB_USER }} >> $DEPLOY_PATH/.env
          echo DB_PASSWORD=${{ secrets.DB_PASSWORD }} >> $DEPLOY_PATH/.env
          echo DB_NAME=${{ secrets.DB_NAME }} >> $DEPLOY_PATH/.env

          chmod 600 $DEPLOY_PATH/.env

          echo '📦 Loading image'
          docker load --input /tmp/image.tar

          cd $DEPLOY_PATH

          echo '🛑 Stopping containers'
          docker-compose -f docker/docker-compose.prod.yml down || true

          echo '🚀 Starting containers'
          docker-compose --env-file .env -f docker/docker-compose.prod.yml up -d --force-recreate

          echo '✅ Deployment complete'
          "
