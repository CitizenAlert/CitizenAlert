name: Deploy API to VPS

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'apps/api/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install

      - name: Run API tests
        run: pnpm --filter api test:cov

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/lcov.info
          flags: api
          name: api-coverage
          fail_ci_if_error: false

  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image-name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME=ghcr.io/$OWNER/citizen-alert-api
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          echo "Using image: $IMAGE_NAME"

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ steps.image.outputs.name }}:latest \
            -t ${{ steps.image.outputs.name }}:${{ github.sha }} \
            .

      - name: Push image
        run: |
          docker push ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
              -i ~/.ssh/vps_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF
            set -e

            export IMAGE_NAME='$IMAGE_NAME'
            export COMMIT_SHA='$COMMIT_SHA'
            export ACTOR='$ACTOR'
            export DEPLOY_PATH='$DEPLOY_PATH'
            export GITHUB_TOKEN='$GITHUB_TOKEN'

            echo "✅ Variables received:"
            echo "IMAGE_NAME=\$IMAGE_NAME"
            echo "DEPLOY_PATH=\$DEPLOY_PATH"

            echo "🔐 Logging into GHCR"
            echo "\$GITHUB_TOKEN" | docker login ghcr.io -u "\$ACTOR" --password-stdin

            cd "\$DEPLOY_PATH"

            echo "⬇️ Pulling latest image"
            docker pull "\$IMAGE_NAME:latest"

            echo "🏷 Tagging previous image"
            docker tag citizen-alert-api:latest citizen-alert-api:previous 2>/dev/null || true
            docker tag "\$IMAGE_NAME:latest" citizen-alert-api:latest

            echo "🛑 Stopping All container only"
            docker compose down

            echo "🚀 Starting All container"
            docker compose up -d

            echo "⏳ Waiting for health check"
            # 24 × 10s = 240s max (largement suffisant)
            for i in \$(seq 1 24); do
              STATUS=\$(docker inspect --format='{{.State.Health.Status}}' citizen-alert-api 2>/dev/null || echo "unknown")
              echo "Attempt \$i/24 → \$STATUS"

              if [ "\$STATUS" = "healthy" ]; then
                echo "✅ Deployment successful"
                break
              fi

              if [ "\$STATUS" = "unhealthy" ]; then
                echo "❌ Container unhealthy — rolling back"
                docker logs citizen-alert-api --tail 30
                docker compose down
                docker tag citizen-alert-api:previous citizen-alert-api:latest
                docker compose up -d
                exit 1
              fi

              if [ "\$i" -eq 24 ]; then
                echo "❌ Health check timeout — rolling back"
                docker logs citizen-alert-api --tail 30
                docker compose down
                docker tag citizen-alert-api:previous citizen-alert-api:latest
                docker compose up -d
                exit 1
              fi

              sleep 10
            done

            docker image prune -f

            echo "✅ Deploy complete — SHA: \$COMMIT_SHA"
          EOF