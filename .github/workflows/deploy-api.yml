name: Deploy API to VPS

on:
  push:
    branches:
      - main
      - production
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    outputs:
      image-name: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=${{ env.REGISTRY }}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')/citizen-alert-api" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ steps.image.outputs.name }}:latest \
            -t ${{ steps.image.outputs.name }}:${{ github.sha }} \
            .

          docker push ${{ steps.image.outputs.name }}:latest
          docker push ${{ steps.image.outputs.name }}:${{ github.sha }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -p ${{ secrets.VPS_PORT }} ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          DEPLOY_PATH: ${{ secrets.VPS_DEPLOY_PATH }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          IMAGE_NAME: ${{ needs.build.outputs.image-name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          ssh -p ${{ secrets.VPS_PORT }} \
              -i ~/.ssh/vps_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << EOF

            set -e

            echo "🔐 Logging into GHCR"
            echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            cd "$DEPLOY_PATH"

            echo "⬇️ Pulling latest image"
            docker pull $IMAGE_NAME:latest

            echo "🏷 Tagging previous image"
            docker tag citizen-alert-api:latest citizen-alert-api:previous 2>/dev/null || true
            docker tag $IMAGE_NAME:latest citizen-alert-api:latest

            echo "🛑 Stopping containers"
            docker compose down -v

            echo "🚀 Starting containers"
            docker compose up -d

            echo "⏳ Waiting for health check"
            RETRIES=12
            DELAY=5

            for i in \$(seq 1 \$RETRIES); do
              STATUS=\$(docker inspect --format='{{.State.Health.Status}}' citizen-alert-api 2>/dev/null || echo "unknown")
              echo "Attempt \$i/\$RETRIES → \$STATUS"

              if [ "\$STATUS" = "healthy" ]; then
                echo "✅ Deployment successful"
                break
              fi

              if [ "\$i" = "\$RETRIES" ]; then
                echo "❌ Health check failed — rolling back"
                docker compose down -v
                docker tag citizen-alert-api:previous citizen-alert-api:latest
                docker compose up -d
                exit 1
              fi

              sleep \$DELAY
            done

            docker image prune -f

            echo "✅ Deploy complete — SHA: $COMMIT_SHA"

          EOF