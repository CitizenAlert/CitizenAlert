<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delete My Data - CitizenAlert</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }
    
    .header {
      margin-bottom: 30px;
      text-align: center;
    }
    
    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 10px;
    }
    
    .header p {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .warning-box {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
      color: #856404;
      font-size: 14px;
      line-height: 1.6;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      color: #333;
      font-weight: 500;
      font-size: 14px;
    }
    
    input[type="email"] {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    
    input[type="email"]:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .checkbox-group {
      display: flex;
      align-items: flex-start;
      margin: 20px 0;
      gap: 10px;
    }
    
    .checkbox-group input[type="checkbox"] {
      margin-top: 4px;
      cursor: pointer;
    }
    
    .checkbox-group label {
      margin: 0;
      cursor: pointer;
      color: #555;
      font-weight: normal;
    }
    
    .button-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 30px;
    }
    
    button {
      padding: 12px 20px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }
    
    .btn-cancel {
      background: #e9ecef;
      color: #333;
    }
    
    .btn-cancel:hover {
      background: #dee2e6;
    }
    
    .btn-delete {
      background: #dc3545;
      color: white;
      grid-column: 1 / -1;
    }
    
    .btn-delete:hover:not(:disabled) {
      background: #c82333;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(220, 53, 69, 0.3);
    }
    
    .btn-delete:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error {
      color: #dc3545;
      font-size: 14px;
      margin-top: 8px;
      display: none;
    }
    
    .error.show {
      display: block;
    }
    
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }
    
    .success.show {
      display: block;
    }
    
    .loading {
      display: none;
      text-align: center;
      color: #666;
    }
    
    .loading.show {
      display: block;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .nav-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 20px;
      text-align: left;
    }
    
    .nav-header a {
      color: white;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      display: inline-block;
      padding: 8px 12px;
      border-radius: 6px;
      transition: background 0.3s;
    }
    
    .nav-header a:hover {
      background: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <div class="nav-header">
    <a href="/">← Back to Home</a>
  </div>
  
  <div class="container">
    <div class="header">
      <h1>🗑️ Delete My Data</h1>
      <p>Permanently remove your account and all associated data</p>
    </div>
    
    <div class="warning-box">
      <strong>⚠️ Warning:</strong> This action is permanent and cannot be undone. All your data including your account, reported hazards, and preferences will be deleted.
    </div>
    
    <div class="success" id="successMessage">
      ✓ Your data has been successfully deleted.
    </div>
    
    <form id="deleteForm">
      <div class="form-group">
        <label for="email">Confirm your email address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          required
          placeholder="your.email@example.com"
        />
        <div class="error" id="emailError"></div>
      </div>
      
      <div class="checkbox-group">
        <input 
          type="checkbox" 
          id="confirm" 
          name="confirm"
          required
        />
        <label for="confirm">I understand that this will permanently delete my account and all data</label>
      </div>
      
      <div class="button-group">
        <button type="button" class="btn-cancel" onclick="window.location.href='/'">Cancel</button>
        <button type="submit" class="btn-delete" id="deleteBtn">Delete My Data</button>
      </div>
      
      <div class="loading" id="loading">
        <span class="spinner"></span> Processing...
      </div>
    </form>
  </div>
  
  <script>
    const form = document.getElementById('deleteForm');
    const deleteBtn = document.getElementById('deleteBtn');
    const loading = document.getElementById('loading');
    const emailInput = document.getElementById('email');
    const emailError = document.getElementById('emailError');
    const successMessage = document.getElementById('successMessage');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      
      if (!email) {
        showError('Email is required');
        return;
      }
      
      deleteBtn.disabled = true;
      loading.classList.add('show');
      emailError.textContent = '';
      emailError.classList.remove('show');
      
      try {
        const response = await fetch('/api/users/delete-data', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email })
        });
        
        if (response.ok) {
          successMessage.classList.add('show');
          form.style.display = 'none';
          
          // Clear tokens if any exist and redirect after 2 seconds
          localStorage.removeItem('token');
          sessionStorage.removeItem('token');
          
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        } else {
          const data = await response.json();
          const errorMessage = data.message || 'Failed to delete data';
          showError(errorMessage);
          deleteBtn.disabled = false;
          loading.classList.remove('show');
        }
      } catch (error) {
        showError(error.message);
        deleteBtn.disabled = false;
        loading.classList.remove('show');
      }
    });
    
    function showError(message) {
      emailError.textContent = message;
      emailError.classList.add('show');
    }
  </script>
</body>
</html>
