services:
  postgres:
    image: postgres:16-alpine
    container_name: citizen-alert-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-citizen_alert}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - citizen-alert-network

  minio:
    image: minio/minio:RELEASE.2024-06-13T22-53-53Z
    container_name: citizen-alert-minio
    command: server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${S3_PORT:-9000}:9000"
      - "9001:9001"
    networks:
      - citizen-alert-network

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: citizen-alert-api
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-citizen_alert}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - API_PORT=3000
      - S3_ENDPOINT=http://minio:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - S3_BUCKET=${S3_BUCKET:-citizen-alert-images}
      - S3_REGION=${S3_REGION:-us-east-1}
    ports:
      - "${API_PORT:-3002}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - citizen-alert-network

volumes:
  postgres_data:
  minio_data:

networks:
  citizen-alert-network:
    driver: bridge
