services:
  postgres:
    image: postgres:16-alpine
    container_name: citizen-alert-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - citizen-alert-network

  minio:
    image: minio/minio:latest
    container_name: citizen-alert-minio
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data
    ports:
      - "${S3_PORT:-9000}:9000"
      - "9001:9001"
    networks:
      - citizen-alert-network

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: citizen-alert-api
    environment:
      NODE_ENV: development
      API_PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      S3_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      IMAGE_MODERATION_ENABLED: ${IMAGE_MODERATION_ENABLED}
      IMAGE_RELEVANCE_CHECK_ENABLED: ${IMAGE_RELEVANCE_CHECK_ENABLED}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL}
    ports:
      - "${API_PORT:-3001}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - citizen-alert-network

volumes:
  postgres_data:
  minio_data:

networks:
  citizen-alert-network:
    driver: bridge
