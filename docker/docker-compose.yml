services:
  postgres:
    image: postgres:16-alpine
    container_name: citizen-alert-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-citizen_alert}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - citizen-alert-network

  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
    container_name: citizen-alert-api
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-citizen_alert}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - API_PORT=3000
    ports:
      - "${API_PORT:-3002}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - citizen-alert-network

volumes:
  postgres_data:

networks:
  citizen-alert-network:
    driver: bridge
