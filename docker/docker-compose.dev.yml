services:
  api:
    build:
      context: ../
      dockerfile: apps/api/Dockerfile
      target: builder
    command: sh -c "cd /app/apps/api && node ../../node_modules/.bin/nest start --watch"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-citizen_alert}
      - JWT_SECRET=${JWT_SECRET:-your-secret-key}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - API_PORT=3000
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/package.json:/app/apps/api/package.json
      - ../pnpm-workspace.yaml:/app/pnpm-workspace.yaml
      - /app/node_modules
      - /app/apps/api/node_modules
    ports:
      - "${API_PORT:-3002}:3000"
